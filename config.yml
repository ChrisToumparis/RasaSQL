# Rasa Configuration File
# Γλώσσα: Ελληνικά (el)
# Pipeline για Greek NLU

language: el

pipeline:
  # Tokenization - Χωρίζει το κείμενο σε λέξεις
- name: WhitespaceTokenizer

  # Featurizers - Εξάγουν χαρακτηριστικά από λέξεις
- name: RegexFeaturizer
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer
- name: CountVectorsFeaturizer
  analyzer: char_wb
  min_ngram: 1
  max_ngram: 4

  # Intent Classifier - Αναγνωρίζει το intent
- name: DIETClassifier
  epochs: 100
  constrain_similarities: true

  # Entity Extractor - Εξάγει entities (προαιρετικό)
- name: EntitySynonymMapper

  # Fallback Classifier - Για άγνωστα intents
- name: FallbackClassifier
  threshold: 0.7

# Policies - Καθορίζουν την ροή συνομιλίας
policies:
- name: MemoizationPolicy
- name: TEDPolicy
  max_history: 5
  epochs: 100
  constrain_similarities: true
- name: RulePolicy
assistant_id: 20260308-141618-connected-engineer
